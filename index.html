<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Novena - 技术文档</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>

<body>
    <div id="app">加载中...</div>
    <script>
        window.$docsify = {
            name: 'Novena',
            repo: 'https://github.com/kyleexu/novena',
            loadSidebar: false,
            autoHeader: true,
            subMaxLevel: 3,
            maxLevel: 4,
            search: {
                placeholder: '搜索',
                noData: '没有结果',
                paths: 'auto'
            },
            auto2top: true,
            coverpage: false,
            executeScript: true,
            plugins: [
                function (hook, vm) {
                    hook.beforeEach(function (html, next) {
                        // 如果不是首页，在内容顶部添加返回首页链接
                        if (vm.route.path !== '/') {
                            html = '<div class="custom-nav"><a href="#/" class="back-home">🏠 返回首页</a></div>\n\n' + html;
                        }
                        next(html);
                    });

                    hook.doneEach(function () {
                        // 添加自定义样式
                        if (!document.querySelector('#custom-nav-style')) {
                            const style = document.createElement('style');
                            style.id = 'custom-nav-style';
                            style.textContent = `
                                .custom-nav {
                                    background: #f8f9fa;
                                    padding: 10px 15px;
                                    border-radius: 4px;
                                    border-left: 4px solid #42b983;
                                    margin-bottom: 20px;
                                }
                                .back-home {
                                    color: #42b983;
                                    text-decoration: none;
                                    font-weight: 500;
                                    font-size: 14px;
                                }
                                .back-home:hover {
                                    color: #369870;
                                    text-decoration: underline;
                                }
                                /* 侧边栏样式优化 */
                                .sidebar {
                                    background: #f8f9fa;
                                    border-right: 1px solid #eee;
                                }
                                .sidebar-nav > ul > li > p {
                                    font-weight: 600;
                                    font-size: 16px;
                                    margin: 0.5rem 0;
                                    color: #2c3e50;
                                    border-bottom: 1px solid #eee;
                                }
                                .sidebar-nav a {
                                    color: #42b983;
                                    font-size: 14px;
                                }
                                .sidebar-nav a:hover {
                                    color: #369870;
                                    text-decoration: underline;
                                }
                            `;
                            document.head.appendChild(style);
                        }
                    });
                }
            ]
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
</body>

</html>
